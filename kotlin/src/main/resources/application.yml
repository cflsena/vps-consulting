spring:
  application:
    name: Credit-Management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/credits}
    username: ${DB_USER:credits}
    password: ${DB_PASS:credits}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

scheduling:
  reconciliation:
    enabled: true
    fixed-delay-ms: 60000
